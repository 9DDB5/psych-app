kind = "mobile"
previewPath = "/"
title = "PsychSession"
version = "1.0.0"
id = "artifacts/psych-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20977

[services.development]
run = "pnpm --filter @workspace/psych-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/psych-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/psych-app", "run", "serve" ]

[services.env]
PORT = "20977"
BASE_PATH = "/"
